<!-- Feature Card Component -->
<div class="group h-full flex flex-col items-start gap-4 rounded-xl bg-card-background p-6 shadow-md hover:shadow-xl border border-border hover:border-primary transition-all duration-300">
    <div class="flex items-center justify-center rounded-lg p-3 bg-{{ feature.icon_color }}/10 group-hover:bg-{{ feature.icon_color }}/20 transition-colors duration-300">
        <i class="fa-solid fa-{{ feature.icon }} text-{{ feature.icon_color }} text-2xl"></i>
    </div>

    <h3 class="font-bold text-lg text-foreground">{{ feature.title }}</h3>
    <p class="text-muted-foreground text-sm leading-relaxed">{{ feature.description }}</p>
    
    <a href="#app" class="text-primary font-semibold text-sm hover:text-primary-600 transition-colors duration-150 inline-flex items-center gap-2 mt-auto">
        Learn More
        <i class="fa-solid fa-arrow-right text-xs"></i>
    </a>
</div>
