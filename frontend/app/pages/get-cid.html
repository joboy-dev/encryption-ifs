<div id="tab-content-get-cid" class="hidden">
    <div class="mb-8">
        <h2 class="text-2xl font-bold text-foreground mb-2">Get CID by Email</h2>
        <p class="text-muted-foreground">
            Retrieve your IPFS CID by providing the email address used during registration.
        </p>
    </div>

    <!-- Success Alert -->
    <div id="get-cid-result" class="hidden mb-8 border border-success-300 bg-success-50 rounded-lg px-6 py-4 shadow-sm transition-all">
        <div class="flex items-start gap-4">
            <div class="flex-shrink-0 w-10 h-10 rounded-full bg-success-100 flex items-center justify-center">
                <i class="fa-solid fa-circle-check text-success-600 text-lg"></i>
            </div>
            <div class="flex-1">
                <h3 class="font-semibold text-success-900 mb-3">CID Found!</h3>
                <p class="text-success-800 text-sm mb-3">Here's the CID associated with your email address:</p>
                <div class="bg-white rounded-md p-3 border border-success-200">
                    <div class="text-xs text-success-700 font-medium mb-1">IPFS CID</div>
                    <div id="get-cid-value" class="font-mono text-sm text-success-900 break-all"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Get CID Form -->
    <form id="form-get-cid" method="post" action="/get-cid" class="space-y-5">
        <div>
            <label class="block text-foreground font-semibold mb-2" for="email">
                <i class="fa-solid fa-envelope mr-2 text-primary"></i>
                Email Address
            </label>
            <input
                type="email"
                id="email"
                name="email"
                placeholder="your@email.com"
                class="w-full px-4 py-3 rounded-lg border border-border bg-secondary-50 text-foreground text-base font-medium placeholder:text-muted-foreground focus:ring-2 focus:ring-primary focus:border-transparent transition"
                autocomplete="email"
                required
            />
            <p class="text-muted-foreground text-xs mt-2">
                <i class="fa-solid fa-info-circle mr-1"></i>
                Enter the same email address you used during registration.
            </p>
        </div>

        <button
            type="submit"
            class="w-full btn bg-primary text-primary-foreground hover:bg-primary-600 transition-colors duration-150 text-base px-4 py-3 font-bold rounded-lg"
        >
            <i class="fa-solid fa-magnifying-glass mr-2"></i>
            Get CID
        </button>
    </form>
</div>
