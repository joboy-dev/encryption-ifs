<div id="tab-content-verify" class="hidden">
    <div class="mb-8">
        <h2 class="text-2xl font-bold text-foreground mb-2">Verify & Decrypt Data</h2>
        <p class="text-muted-foreground">
            Verify data integrity using blockchain and decrypt your information.
        </p>
    </div>

    <!-- Success Alert -->
    <div id="verify-decrypted-result" class="hidden mb-8 border border-success-300 bg-success-50 rounded-lg px-6 py-4 shadow-sm transition-all">
        <div class="flex items-start gap-4">
            <div class="flex-shrink-0 w-10 h-10 rounded-full bg-success-100 flex items-center justify-center">
                <i class="fa-solid fa-circle-check text-success-600 text-lg"></i>
            </div>
            <div class="flex-1">
                <h3 class="font-semibold text-success-900 mb-3">Verification Successful!</h3>
                <p class="text-success-800 text-sm mb-4">Your data has been verified and decrypted. Here's the information:</p>
                <div class="bg-white rounded-md p-4 border border-success-200 space-y-3">
                    <div>
                        <div class="text-xs font-medium text-success-700 mb-1">Email</div>
                        <div id="verify-decrypted-email" class="font-mono text-sm text-success-900"></div>
                    </div>
                    <div>
                        <div class="text-xs font-medium text-success-700 mb-1">Full Name</div>
                        <div id="verify-decrypted-full_name" class="font-mono text-sm text-success-900"></div>
                    </div>
                    <div>
                        <div class="text-xs font-medium text-success-700 mb-1">ID Number</div>
                        <div id="verify-decrypted-id_number" class="font-mono text-sm text-success-900"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Verify Form -->
    <form id="form-verify" method="post" action="/verify" class="space-y-5">
        <div>
            <label class="block text-foreground font-semibold mb-2" for="cid">
                <i class="fa-solid fa-fingerprint mr-2 text-primary"></i>
                IPFS Content Identifier (CID)
            </label>
            <input
                type="text"
                id="cid"
                name="cid"
                placeholder="QmX... or paste your CID here"
                class="w-full px-4 py-3 rounded-lg border border-border bg-secondary-50 text-foreground text-base font-medium placeholder:text-muted-foreground focus:ring-2 focus:ring-primary focus:border-transparent transition font-mono"
                autocomplete="off"
                required
            />
            <p class="text-muted-foreground text-xs mt-2">
                <i class="fa-solid fa-lightbulb mr-1 text-warning"></i>
                The CID is returned after encrypting data in the Register & Encrypt tab.
            </p>
        </div>

        <button
            type="submit"
            class="w-full btn bg-primary text-primary-foreground hover:bg-primary-600 transition-colors duration-150 text-base px-4 py-3 font-bold rounded-lg"
        >
            <i class="fa-solid fa-circle-check mr-2"></i>
            Verify & Decrypt
        </button>
    </form>
</div>
