{% extends "pages/base_layout.html" %}

{% block page_title %}404 - Page Not Found{% endblock %}

{% block content %}
<div class="flex-1 flex items-center justify-center w-full bg-gradient-to-br from-background to-secondary-50">
    <div class="page-padding">
        <div class="max-w-md mx-auto text-center">
            <!-- Error Code -->
            <div class="mb-8">
                <div class="text-9xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-primary to-primary-600 mb-4">
                    404
                </div>
            </div>

            <!-- Error Message -->
            <h1 class="text-4xl font-bold text-foreground mb-3">Page Not Found</h1>
            <p class="text-lg text-muted-foreground mb-8">
                The page you're looking for doesn't exist or has been moved. Let's get you back on track.
            </p>

            <!-- Error Icon -->
            <div class="mb-8">
                <div class="inline-flex items-center justify-center w-24 h-24 rounded-full bg-danger-50 border-2 border-danger-200">
                    <i class="fa-solid fa-magnifying-glass text-danger text-4xl"></i>
                </div>
            </div>

            <!-- Actions -->
            <div class="flex flex-col sm:flex-row gap-4 items-center justify-center">
                <a href="/" class="btn bg-primary text-primary-foreground hover:bg-primary-600 transition-colors duration-150 px-6 py-3">
                    <i class="fa-solid fa-home mr-2"></i>
                    Go Home
                </a>
                <a href="/app" class="btn border-2 border-primary text-primary hover:bg-primary-50 transition-colors duration-150 px-6 py-3">
                    <i class="fa-solid fa-arrow-right mr-2"></i>
                    Go to App
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
